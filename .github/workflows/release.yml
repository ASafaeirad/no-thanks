name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - run: pnpm build

      - run: ls -la release

      - uses: softprops/action-gh-release@v3
        with:
          files: release/*.zip
